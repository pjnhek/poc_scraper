app = "poc-scraper-mcp"
primary_region = "iad"

[build]

[env]
  MCP_PUBLIC_HOSTNAME = "poc-scraper-mcp.fly.dev"

# Exactly one machine is required so the in-memory demo rate limits stay
# global (HOST-06). fly.toml has no max-machines knob; `make deploy-fly` runs
# `fly scale count 1` after every deploy to enforce it. auto_stop/suspend keeps
# that single machine idle-cheap without fragmenting the limit counters.
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
